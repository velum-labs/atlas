name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.14"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-packages --group docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          # For first-time bootstrap, provide a repository secret named
          # PAGES_ENABLEMENT_TOKEN with repo/pages write access (PAT) or a GitHub
          # App token with administration:write + pages:write. Otherwise the
          # default GITHUB_TOKEN is used and the repository must already have
          # Pages enabled with "GitHub Actions" as the build source.
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}

      - name: Build docs site
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
