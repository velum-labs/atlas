name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - id: packages
        name: Read workspace package order
        run: echo "packages=$(python3 scripts/workspace_packages.py --json)" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: customer
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d customer"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      ALMA_TEST_DBT_MANIFEST: ${{ github.workspace }}/testdata/dbt/integration_manifest.json
      PG_TEST_DSN: postgresql://postgres:test@localhost:5432/customer
      PG_TEST_SCHEMA: public

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.14"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --all-packages

      - name: Seed Postgres integration database
        run: |
          uv run python - <<'PY'
          import psycopg

          dsn = "postgresql://postgres:test@localhost:5432/customer"
          with psycopg.connect(dsn, autocommit=True) as conn:
              with conn.cursor() as cur:
                  cur.execute(
                      """
                      CREATE TABLE IF NOT EXISTS public.orders (
                          id INTEGER PRIMARY KEY,
                          customer_id INTEGER NOT NULL,
                          total NUMERIC NOT NULL
                      )
                      """
                  )
                  cur.execute(
                      """
                      INSERT INTO public.orders (id, customer_id, total)
                      VALUES (1, 10, 42.50), (2, 11, 18.00)
                      ON CONFLICT (id) DO NOTHING
                      """
                  )
          PY

      - name: Lint
        run: uv run ruff check packages/ scripts/

      - name: Type check
        run: |
          readarray -t targets < <(python3 scripts/typecheck_targets.py)
          uv run ty check "${targets[@]}"

      - name: Test
        run: uv run pytest packages/ -q --tb=short -m "not real_e2e"

      - name: Build all packages
        run: uv build --all

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.14"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-packages --group docs

      - name: Build docs
        run: uv run mkdocs build --strict

  version-sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check package versions are in sync with VERSION file
        run: python3 scripts/sync-versions.py --check

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.14"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install
        run: uv sync --frozen --all-packages

      - name: CLI smoke test
        run: |
          uv run alma-atlas --version
          uv run alma-atlas --help
          uv run alma-atlas status --help
          uv run alma-atlas connect --help
          uv run alma-atlas connect snowflake --help
          uv run alma-atlas connect airflow --help
          uv run alma-atlas connect looker --help
          uv run alma-atlas connect fivetran --help
          uv run alma-atlas connect metabase --help
          uv run alma-atlas scan --help
          uv run alma-atlas search --help
          uv run alma-atlas lineage --help
          uv run alma-atlas export --help
          uv run alma-atlas team --help
          uv run alma-atlas serve --help

      - name: Import smoke test
        run: |
          uv run python -c "
          from alma_atlas.config import AtlasConfig
          from alma_atlas.mcp.server import create_server
          from alma_atlas.pipeline.scan import run_scan
          from alma_atlas.pipeline.stitch import stitch
          from alma_atlas_store.db import Database
          from alma_atlas_store.asset_repository import AssetRepository
          from alma_connectors.adapters.bigquery import BigQueryAdapter
          from alma_connectors.adapters.dbt import DbtAdapter
          from alma_connectors.adapters.airflow import AirflowAdapter
          from alma_connectors.adapters.fivetran import FivetranAdapter
          from alma_connectors.adapters.looker import LookerAdapter
          from alma_connectors.adapters.metabase import MetabaseAdapter
          from alma_connectors.adapters.postgres import PostgresAdapter
          from alma_connectors.adapters.snowflake import SnowflakeAdapter
          from alma_analysis.edges import extract_edges
          from alma_analysis.lineage import compute_lineage
          from alma_sqlkit.parser import SQLParser
          import starlette
          import uvicorn
          db = Database(':memory:')
          AssetRepository(db)
          SQLParser().parse('SELECT 1 FROM t')
          print('all imports + smoke OK')
          "

  emulate-github-smoke:
    runs-on: ubuntu-latest
    needs: test
    env:
      EMULATE_GITHUB_BASE_URL: http://127.0.0.1:4001
      EMULATE_GITHUB_TOKEN: gho_test_token_admin
      EMULATE_GITHUB_OWNER: octocat
      EMULATE_GITHUB_REPO: atlas-ci-smoke
      EMULATE_GITHUB_BRANCH: main
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.14"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-packages

      - name: Run emulate GitHub smoke test
        run: |
          pnpm dlx emulate --service vercel,github,google --port 4000 --seed testdata/emulate/github-default.yaml > emulate.log 2>&1 &
          EMULATE_PID=$!
          trap 'kill ${EMULATE_PID}' EXIT
          uv run python - <<'PY'
          import socket
          import time

          deadline = time.time() + 30
          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 4001), timeout=1):
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("emulate GitHub fixture did not start on port 4001")
          PY
          uv run pytest packages/alma-atlas/tests/test_github_emulate.py -q --tb=short

  publish-dry-run:
    runs-on: ubuntu-latest
    needs: [test, workspace-packages]
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        package: ${{ fromJson(needs.workspace-packages.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.14"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install twine
        run: uv tool install twine

      - name: Build package
        working-directory: packages/${{ matrix.package }}
        run: uv build -o dist --clear

      - name: Check wheel metadata (twine check)
        working-directory: packages/${{ matrix.package }}
        run: uvx twine check dist/*

      - name: Verify wheel contents
        working-directory: packages/${{ matrix.package }}
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          echo "Inspecting $WHEEL"
          python3 -c "
          import zipfile, sys
          whl = sys.argv[1]
          with zipfile.ZipFile(whl) as z:
              names = z.namelist()
              # Find METADATA file
              meta = [n for n in names if n.endswith('/METADATA')]
              assert meta, f'No METADATA found in {whl}'
              content = z.read(meta[0]).decode()
              assert 'Name:' in content, 'Missing Name field in METADATA'
              assert 'Version:' in content, 'Missing Version field in METADATA'
              print('Wheel contents OK:', meta[0])
              for line in content.splitlines()[:10]:
                  print(' ', line)
          " "$WHEEL"
