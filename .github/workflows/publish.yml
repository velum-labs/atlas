name: Publish Packages

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  REGISTRY_URL: https://ghcr.io

jobs:
  # Build all packages in dependency order and publish to GitHub Packages
  publish:
    runs-on: ubuntu-latest
    environment: release
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        # Ordered by dependency: leaf packages first
        package:
          - alma-ports
          - alma-sqlkit
          - alma-algebrakit
          - alma-atlas-store
          - alma-connectors
          - alma-analysis
          - alma-atlas
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package version
        working-directory: packages/${{ matrix.package }}
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml

      - name: Build package
        working-directory: packages/${{ matrix.package }}
        run: uv build

      - name: Publish to GitHub Packages (PyPI registry)
        working-directory: packages/${{ matrix.package }}
        run: |
          uv publish \
            --publish-url "https://ghcr.io/v2/${{ github.repository_owner }}" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            dist/*

  # Also publish to PyPI for public consumption (when PYPI_TOKEN is set)
  publish-pypi:
    runs-on: ubuntu-latest
    needs: publish
    if: secrets.PYPI_TOKEN != ''
    environment: release
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        package:
          - alma-ports
          - alma-sqlkit
          - alma-algebrakit
          - alma-atlas-store
          - alma-connectors
          - alma-analysis
          - alma-atlas
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update package version
        working-directory: packages/${{ matrix.package }}
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml

      - name: Build package
        working-directory: packages/${{ matrix.package }}
        run: uv build

      - name: Publish to PyPI
        working-directory: packages/${{ matrix.package }}
        run: |
          uv publish \
            --token "${{ secrets.PYPI_TOKEN }}" \
            dist/*
