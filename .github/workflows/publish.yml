name: Publish Packages

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # Required for OIDC Trusted Publisher auth with PyPI
  packages: write   # Required for ghcr.io publish via PyOCI

jobs:
  workspace-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - id: packages
        name: Read workspace package order
        run: echo "packages=$(python3 scripts/workspace_packages.py --json)" >> "$GITHUB_OUTPUT"

  publish:
    runs-on: ubuntu-latest
    needs: workspace-packages
    environment: release
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        package: ${{ fromJson(needs.workspace-packages.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.14"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync versions
        run: |
          echo "${{ steps.version.outputs.version }}" > VERSION
          python3 scripts/sync-versions.py

      - name: Build package
        working-directory: packages/${{ matrix.package }}
        run: uv build

      - name: Publish to PyPI (OIDC Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/${{ matrix.package }}/dist/

      - name: Publish to ghcr.io via PyOCI
        working-directory: packages/${{ matrix.package }}
        run: |
          uv publish \
            --publish-url "https://pyoci.com/ghcr.io/velum-labs/" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}"
