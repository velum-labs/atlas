name: Publish Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # Required for GitHub Release creation
  id-token: write   # Required for OIDC Trusted Publisher auth with PyPI
  packages: write   # Required for ghcr.io publish via PyOCI

jobs:
  workspace-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - id: packages
        name: Read workspace package order
        run: echo "packages=$(python3 scripts/workspace_packages.py --json)" >> "$GITHUB_OUTPUT"

  publish:
    runs-on: ubuntu-latest
    needs: workspace-packages
    environment: release
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        package: ${{ fromJson(needs.workspace-packages.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.14"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify release version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          REPO_VERSION="$(tr -d '\n' < VERSION)"
          if [[ "$TAG_VERSION" != "$REPO_VERSION" ]]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match VERSION file (${REPO_VERSION})" >&2
            echo "  Run: echo '${TAG_VERSION}' > VERSION && python3 scripts/sync-versions.py && git commit -am 'chore: bump version to ${TAG_VERSION}' && git tag -a v${TAG_VERSION} -m 'Release v${TAG_VERSION}'" >&2
            exit 1
          fi
          python3 scripts/sync-versions.py --check

      - name: Build package
        working-directory: packages/${{ matrix.package }}
        run: uv build

      - name: Check wheel metadata (twine)
        working-directory: packages/${{ matrix.package }}
        run: uvx twine check dist/*

      - name: Publish to PyPI (OIDC Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/${{ matrix.package }}/dist/
          verbose: true
          # Allow re-triggering the workflow after a partial failure: packages
          # already uploaded to PyPI are skipped rather than causing HTTP 400.
          skip-existing: true

      - name: Publish to ghcr.io via PyOCI
        working-directory: packages/${{ matrix.package }}
        run: |
          uv publish \
            --publish-url "https://pyoci.com/ghcr.io/velum-labs/" \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}"

  # Verify the published packages are actually installable from PyPI.
  # Runs in a clean virtualenv with no workspace sources on PATH — catches
  # missing dependencies, broken entry points, and import errors that only
  # appear after the wheel leaves the monorepo.
  pypi-smoke:
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.14"

      - name: Set up Python
        run: uv python install 3.12

      - name: Wait for PyPI propagation
        # PyPI CDN propagation typically takes 30–120 s after upload.
        run: sleep 90

      - name: Install alma-atlas from PyPI in a clean environment
        run: |
          VERSION="$(tr -d '\n' < VERSION)"
          uv venv --python 3.12 .venv-pypi-smoke
          .venv-pypi-smoke/bin/pip install --no-cache-dir "alma-atlas==${VERSION}"

      - name: CLI smoke test (from PyPI install)
        run: |
          .venv-pypi-smoke/bin/alma-atlas --version
          .venv-pypi-smoke/bin/alma-atlas --help

      - name: Import smoke test (from PyPI install)
        run: |
          .venv-pypi-smoke/bin/python - <<'PY'
          from alma_atlas.config import AtlasConfig
          from alma_atlas.mcp.server import create_server
          from alma_atlas.pipeline.scan import run_scan
          from alma_atlas_store.db import Database
          from alma_atlas_store.asset_repository import AssetRepository
          from alma_sqlkit.parser import SQLParser
          from alma_algebrakit import __version__ as algebrakit_version
          from alma_connectors import __version__ as connectors_version

          db = Database(":memory:")
          AssetRepository(db)
          SQLParser().parse("SELECT 1 FROM t")
          print(f"alma-algebrakit {algebrakit_version} OK")
          print(f"alma-connectors {connectors_version} OK")
          print("PyPI smoke: all imports OK")
          PY

      - name: Verify all packages visible on PyPI
        # Confirms every public package (not just alma-atlas) appears on PyPI
        # at the released version. Uses the PyPI JSON API — no install required.
        run: python3 scripts/check-pypi.py

  # Create a GitHub Release after all packages are published and smoke passes.
  # The release body lists every published package with its PyPI URL so there
  # is a permanent, linkable audit trail for each release.
  github-release:
    runs-on: ubuntu-latest
    needs: pypi-smoke
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "version=$(tr -d '\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.ver.outputs.version }}"
          body: |
            ## Alma Atlas v${{ steps.ver.outputs.version }}

            All packages published to PyPI and verified installable.

            ### Published packages

            | Package | PyPI |
            |---------|------|
            | `alma-atlas` | https://pypi.org/project/alma-atlas/${{ steps.ver.outputs.version }}/ |
            | `alma-atlas-store` | https://pypi.org/project/alma-atlas-store/${{ steps.ver.outputs.version }}/ |
            | `alma-connectors` | https://pypi.org/project/alma-connectors/${{ steps.ver.outputs.version }}/ |
            | `alma-analysis` | https://pypi.org/project/alma-analysis/${{ steps.ver.outputs.version }}/ |
            | `alma-sqlkit` | https://pypi.org/project/alma-sqlkit/${{ steps.ver.outputs.version }}/ |
            | `alma-algebrakit` | https://pypi.org/project/alma-algebrakit/${{ steps.ver.outputs.version }}/ |
            | `alma-ports` | https://pypi.org/project/alma-ports/${{ steps.ver.outputs.version }}/ |

            ### Install

            ```bash
            uv add alma-atlas==${{ steps.ver.outputs.version }}
            # or: pip install alma-atlas==${{ steps.ver.outputs.version }}
            ```
          draft: false
          prerelease: false
