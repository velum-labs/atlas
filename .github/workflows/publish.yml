name: Publish Packages

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # Required for OIDC Trusted Publisher auth with PyPI

jobs:
  # Build and publish all packages to PyPI in dependency order
  publish:
    runs-on: ubuntu-latest
    environment: release
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        # Ordered by dependency: leaf packages first
        package:
          - alma-ports
          - alma-sqlkit
          - alma-algebrakit
          - alma-atlas-store
          - alma-connectors
          - alma-analysis
          - alma-atlas
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync versions
        run: |
          echo "${{ steps.version.outputs.version }}" > VERSION
          python3 scripts/sync-versions.py

      - name: Build package
        working-directory: packages/${{ matrix.package }}
        run: uv build

      - name: Publish to PyPI (OIDC Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/${{ matrix.package }}/dist/
