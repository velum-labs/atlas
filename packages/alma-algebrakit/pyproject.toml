[project]
name = "alma-algebrakit"
version = "0.1.0"
description = "SQL algebraic fingerprinting and query normalization for Alma Atlas"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alma-sqlkit",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alma_algebrakit"]
