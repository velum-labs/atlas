[project]
name = "alma-algebrakit"
version = "0.1.0"
description = "Pure relational algebra engine - schema, scope, resolution, bound types, proof (NO SQL)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
]
# Note: alma-algebrakit has NO sqlglot dependency - it's pure algebra

[project.optional-dependencies]
proof = ["z3-solver>=4.12.0"]
empirical = ["duckdb>=1.0.0"]
dev = [
    "pytest>=8.3.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alma_algebrakit"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
disallow_untyped_decorators = false
ignore_missing_imports = true
plugins = ["pydantic.mypy"]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]
ignore = ["E501", "B008", "C901"]

[tool.ruff.lint.per-file-ignores]
# TYPE_CHECKING imports with _ aliases used in __getattr__ for lazy loading
"src/alma_algebrakit/learning/__init__.py" = ["F401"]
# Test file imports module dynamically via __import__
"tests/test_public_exports.py" = ["F821"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
