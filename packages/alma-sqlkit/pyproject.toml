[project]
name = "alma-sqlkit"
version = "0.1.0"
description = "SQL parsing and normalization utilities for Alma Atlas"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "sqlglot>=26.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alma_sqlkit"]
