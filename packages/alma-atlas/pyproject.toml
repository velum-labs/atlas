[project]
name = "alma-atlas"
version = "0.1.0"
description = "Alma Atlas — open-source data stack discovery CLI + MCP server"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alma-ports",
    "alma-connectors",
    "alma-analysis",
    "alma-algebrakit",
    "alma-sqlkit",
    "alma-atlas-store",
    "typer>=0.15",
    "mcp>=1.6",
    "networkx>=3.4",
    "rich>=13.9",
    "pyyaml>=6.0.3",
    "agent-client-protocol>=0.9.0",
    "starlette>=0.46",
    "uvicorn>=0.34",
    "httpx>=0.27",
    "posthog>=3.0",
]

[project.scripts]
alma-atlas = "alma_atlas.cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alma_atlas"]

[tool.hatch.build.targets.wheel.force-include]
"src/alma_atlas/data/atlas-sample.db.gz" = "alma_atlas/data/atlas-sample.db.gz"
