[project]
name = "alma-atlas"
version = "0.1.0"
description = "Alma Atlas — open-source data stack discovery CLI + MCP server"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alma-ports",
    "alma-connectors",
    "alma-analysis",
    "alma-algebrakit",
    "alma-sqlkit",
    "alma-atlas-store",
    "typer>=0.15",
    "mcp>=1.6",
    "networkx>=3.4",
    "rich>=13.9",
]

[project.scripts]
alma-atlas = "alma_atlas.cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alma_atlas"]
