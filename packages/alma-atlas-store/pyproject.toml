[project]
name = "alma-atlas-store"
version = "0.1.0"
description = "SQLite persistence layer for Alma Atlas"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alma-ports",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alma_atlas_store"]
