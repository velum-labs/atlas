[project]
name = "alma-analysis"
version = "0.1.0"
description = "Pure analysis functions for Alma Atlas (lineage, edges, consumers)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alma-graph",
    "alma-algebrakit",
    "alma-sqlkit",
    "alma-connectors",
    "sqlglot>=24.0.0",
    "networkx>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alma_analysis"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
