[project]
name = "alma-analysis"
version = "0.1.0"
description = "Pure analysis functions for Alma Atlas (lineage, edges, consumers)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alma-algebrakit",
    "alma-sqlkit",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alma_analysis"]
