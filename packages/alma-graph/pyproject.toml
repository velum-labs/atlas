[project]
name = "alma-graph"
version = "0.1.0"
description = "Canonical graph core for Alma Atlas and Alma"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "networkx>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alma_graph"]

[tool.pytest.ini_options]
pythonpath = ["src"]
