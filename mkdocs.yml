site_name: Alma Atlas
site_description: Open-source data stack discovery CLI, MCP server, and Python workspace
site_url: https://velum-labs.github.io/atlas/
repo_url: https://github.com/velum-labs/atlas
repo_name: velum-labs/atlas
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
strict: true
exclude_docs: |
  launch/**
watch:
  - packages
  - scripts

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.action.view

nav:
  - Home: index.md
  - Tutorials:
      - Quickstart: quickstart.md
  - How-To Guides:
      - Connect Sources: adapters.md
  - Reference:
      - Overview: reference/index.md
      - Config Reference: config-reference.md
      - MCP Tools Reference: mcp-tools.md
      - API Reference: reference/api/
  - Explanation:
      - Architecture: architecture.md

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/alma-atlas/src
            - packages/alma-atlas-store/src
            - packages/alma-connectors/src
            - packages/alma-analysis/src
            - packages/alma-sqlkit/src
            - packages/alma-algebrakit/src
            - packages/alma-ports/src
          options:
            docstring_style: google
            merge_init_into_class: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
